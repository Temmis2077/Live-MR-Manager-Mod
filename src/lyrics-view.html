<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가사 뷰 — Live MR Manager</title>
  <!--
    가사 뷰 — 퍼포머 본인이 보는 전체 가사 화면. 두 가지 방식으로 쓴다:
      1) OBS 커스텀 독/브라우저: http://localhost:14202/lyrics-view
      2) 앱 내부 호버창: ?hover=1 (Tauri 창) — 항상 위 + 배경 투명도 조절 +
         헤더 드래그로 이동. 호버 전용 컨트롤은 이 파라미터일 때만 보이므로
         OBS 쪽 화면은 그대로 유지된다.
    송출용 오버레이(/overlay-lyrics)와 달리 전체 가사를 나열하고 현재 부르는
    줄을 하이라이트 + 자동 스크롤한다. 폰트 크기·투명도는 이 페이지 안에서
    조절하며 localStorage에 저장(송출 스타일과 무관).
  -->
  <style>
    :root {
      --fs: 20px;
      --bg-alpha: 1;
      --bg: rgba(11, 11, 16, var(--bg-alpha));
      --text: #e8edf5;
      --dim: rgba(232, 237, 245, 0.42);
      --accent: #3b82f6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SUITE', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* 호버창: 창 자체가 투명이라 페이지 배경 알파가 곧 체감 투명도 */
    body.hover-mode { border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); }
    body:not(.hover-mode) .hover-only { display: none !important; }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    #song-title {
      font-weight: 800;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #song-artist {
      font-size: 0.75rem;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .spacer { flex: 1; }
    .fs-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
    }
    .fs-btn:hover { border-color: var(--accent); }
    .meta-chip {
      flex-shrink: 0;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      font-size: 0.72rem;
      font-weight: 800;
      white-space: nowrap;
    }
    /* 호버창 전용 컨트롤: 투명도 슬라이더 / 항상 위 / 닫기 */
    #opacity-range {
      width: 74px;
      flex-shrink: 0;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .fs-btn.toggled {
      background: rgba(59, 130, 246, 0.25);
      border-color: var(--accent);
      color: var(--accent);
    }
    .fs-btn.close-btn:hover { border-color: #ef4444; color: #ef4444; }

    #lyrics {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px 45vh; /* 아래 여백: 마지막 줄도 화면 위쪽에서 하이라이트 가능 */
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }
    .line {
      font-size: var(--fs);
      line-height: 1.55;
      padding: 6px 10px;
      border-radius: 10px;
      color: var(--dim);
      transition: color 0.25s ease, background 0.25s ease;
      word-break: keep-all;
    }
    .line.active {
      color: var(--text);
      background: rgba(59, 130, 246, 0.14);
      font-weight: 700;
    }
    .line.passed { color: rgba(232, 237, 245, 0.28); }
    #empty {
      color: var(--dim);
      text-align: center;
      padding-top: 30vh;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- 호버창에서는 헤더 빈 영역을 잡아 창을 옮길 수 있다(data-tauri-drag-region) -->
  <header data-tauri-drag-region>
    <div style="min-width:0;" data-tauri-drag-region>
      <div id="song-title" data-tauri-drag-region>재생 중인 곡 없음</div>
      <div id="song-artist" data-tauri-drag-region></div>
    </div>
    <!-- 곡 정보에 키/BPM이 등록돼 있으면 표시 -->
    <span class="meta-chip" id="chip-key" style="display:none;"></span>
    <span class="meta-chip" id="chip-bpm" style="display:none;"></span>
    <div class="spacer" data-tauri-drag-region></div>
    <input type="range" class="hover-only" id="opacity-range" min="20" max="100" step="5" value="100" title="배경 투명도">
    <button type="button" class="fs-btn" id="fs-minus" title="글자 작게">−</button>
    <button type="button" class="fs-btn" id="fs-plus" title="글자 크게">＋</button>
    <button type="button" class="fs-btn hover-only" id="pin-btn" title="항상 위에 표시">📌</button>
    <button type="button" class="fs-btn close-btn hover-only" id="close-btn" title="닫기">×</button>
  </header>
  <div id="lyrics"><div id="empty">가사가 로드되면 여기에 표시됩니다.</div></div>

  <script src="js/overlay/shared.js"></script>
  <script>
    const lyricsEl = document.getElementById('lyrics');
    const titleEl = document.getElementById('song-title');
    const artistEl = document.getElementById('song-artist');

    // 폰트 크기 — 이 페이지 전용(브라우저별 localStorage)
    let fs = parseInt(localStorage.getItem('lyricsViewFontSize'), 10) || 20;
    const applyFs = () => {
      fs = Math.max(12, Math.min(48, fs));
      document.documentElement.style.setProperty('--fs', fs + 'px');
      localStorage.setItem('lyricsViewFontSize', String(fs));
    };
    document.getElementById('fs-minus').onclick = () => { fs -= 2; applyFs(); };
    document.getElementById('fs-plus').onclick = () => { fs += 2; applyFs(); };
    applyFs();

    // ── 호버창 모드: 배경 투명도 · 항상 위 · 닫기 ─────────────────────
    // 앱 내부 창(Tauri)에서 열렸으면 항상 호버 모드. `?hover=1`은 명시적
    // 지정용(브라우저 테스트 등). OBS/브라우저(http)에서는 꺼진 채로 유지.
    const isHover = !!window.__TAURI__
      || new URLSearchParams(location.search).get('hover') === '1';
    if (isHover) {
      document.body.classList.add('hover-mode');

      const opacityRange = document.getElementById('opacity-range');
      let alpha = parseInt(localStorage.getItem('lyricsViewBgAlpha'), 10);
      if (!Number.isFinite(alpha)) alpha = 100;
      const applyAlpha = () => {
        alpha = Math.max(20, Math.min(100, alpha));
        document.documentElement.style.setProperty('--bg-alpha', String(alpha / 100));
        opacityRange.value = String(alpha);
        localStorage.setItem('lyricsViewBgAlpha', String(alpha));
      };
      opacityRange.oninput = () => { alpha = parseInt(opacityRange.value, 10); applyAlpha(); };
      applyAlpha();

      const tauriWindow = window.__TAURI__?.window;
      const currentWindow = tauriWindow?.getCurrentWindow?.();
      const pinBtn = document.getElementById('pin-btn');
      // 창은 항상 위 상태로 열리므로 버튼도 켜진 상태에서 시작.
      let pinned = true;
      pinBtn.classList.add('toggled');
      pinBtn.onclick = async () => {
        pinned = !pinned;
        pinBtn.classList.toggle('toggled', pinned);
        try { await currentWindow?.setAlwaysOnTop(pinned); } catch (e) { console.error(e); }
      };
      document.getElementById('close-btn').onclick = async () => {
        try { await currentWindow?.close(); } catch (e) { console.error(e); }
      };
    }

    let renderedLines = null; // 마지막으로 렌더한 가사(참조 비교 대신 join 키)
    let lastIndex = -2;

    function renderLines(lines) {
      lyricsEl.innerHTML = '';
      if (!lines || lines.length === 0) {
        lyricsEl.innerHTML = '<div id="empty">가사가 로드되면 여기에 표시됩니다.</div>';
        return;
      }
      lines.forEach((text, i) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.dataset.index = i;
        div.innerHTML = text; // 3줄 모드는 <br> 포함 HTML로 옴
        lyricsEl.appendChild(div);
      });
    }

    function highlight(index) {
      const nodes = lyricsEl.querySelectorAll('.line');
      nodes.forEach((el, i) => {
        el.classList.toggle('active', i === index);
        el.classList.toggle('passed', index >= 0 && i < index);
      });
      const active = nodes[index];
      if (active) {
        // 현재 줄이 화면 위쪽 1/3 지점에 오도록 스크롤
        const target = active.offsetTop - lyricsEl.clientHeight / 3;
        lyricsEl.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
      }
    }

    OverlayShared.connectWS((data) => {
      titleEl.textContent = data.title || '재생 중인 곡 없음';
      artistEl.textContent = data.artist || '';

      // 키/BPM — 곡 정보에 등록돼 있을 때만 표시
      const key = (data.song_key || data.songKey || '').trim();
      const bpm = Number(data.bpm) || 0;
      const chipKey = document.getElementById('chip-key');
      const chipBpm = document.getElementById('chip-bpm');
      chipKey.style.display = key ? '' : 'none';
      if (key) chipKey.textContent = `KEY ${key}`;
      chipBpm.style.display = bpm > 0 ? '' : 'none';
      if (bpm > 0) chipBpm.textContent = `${Math.round(bpm)} BPM`;

      const lines = data.lyrics_lines || data.lyricsLines || [];
      const linesKey = lines.join('|');
      if (linesKey !== renderedLines) {
        renderedLines = linesKey;
        lastIndex = -2;
        renderLines(lines);
      }

      const index = (data.lyric_index ?? data.lyricIndex ?? -1);
      if (index !== lastIndex) {
        lastIndex = index;
        highlight(index);
      }
    });
  </script>
</body>
</html>
