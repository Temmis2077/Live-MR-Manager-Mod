<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live MR Lyrics Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700;900&family=SUITE:wght@400;700;800&display=swap');
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --accent-color: #3b82f6;
      --overlay-scale: 1;
      --overlay-font: 'Inter', 'Noto Sans KR', sans-serif;
      --overlay-rounding: 20px;
      --glass-bg: rgba(15, 15, 20, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.5);
      --text-shadow: rgba(0, 0, 0, 0.3);
      --enter-gap-x: 120px;
      --enter-gap-y: 80px;
      /* 원문/차음(+번역) 3줄 모드는 <br>로 2~3줄이 들어올 수 있어 여유를 둠.
         (전체 오버레이 레이아웃 리디자인은 하지 않고 높이만 늘림) */
      --lyric-current-height: 50px;
      --lyric-next-height: 40px;
      --lyric-lines-gap: 4px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: var(--text-main);
      font-family: var(--overlay-font);
      overflow: hidden;
      width: 1200px;
      height: 300px;
      position: relative;
    }

    .overlay-container {
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 18px 28px;
      border-radius: var(--overlay-rounding);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      
      min-width: 400px;
      max-width: 90vw;
      min-height: 96px;
      text-align: center;

      transition: opacity 0.35s ease, border-radius 0.3s ease, background 0.3s ease;
      will-change: transform, opacity;
      opacity: 0;
    }

    /* RIGHT ALIGNED (comes from right) */
    .overlay-container.dir-right { transform: translate(calc(100% + var(--enter-gap-x)), -50%) scale(0.97); }
    .overlay-container.dir-right.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
      animation: lyrics-pop-right var(--anim-duration, 0.55s) cubic-bezier(0.2, 0.9, 0.3, 1) both;
    }

    /* LEFT ALIGNED (comes from left) */
    .overlay-container.dir-left { transform: translate(calc(-100% - var(--enter-gap-x)), -50%) scale(0.97); }
    .overlay-container.dir-left.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
      animation: lyrics-pop-left var(--anim-duration, 0.55s) cubic-bezier(0.2, 0.9, 0.3, 1) both;
    }

    /* TOP ALIGNED (comes from top) */
    .overlay-container.dir-top { transform: translate(-50%, calc(-100% - var(--enter-gap-y))) scale(0.97); }
    .overlay-container.dir-top.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
      animation: lyrics-pop-top var(--anim-duration, 0.55s) cubic-bezier(0.2, 0.9, 0.3, 1) both;
    }

    /* BOTTOM ALIGNED (comes from bottom) */
    .overlay-container.dir-bottom { transform: translate(-50%, calc(100% + var(--enter-gap-y))) scale(0.97); }
    .overlay-container.dir-bottom.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
      animation: lyrics-pop-bottom var(--anim-duration, 0.55s) cubic-bezier(0.2, 0.9, 0.3, 1) both;
    }

    .lyrics-container {
      display: none;
      flex-direction: column;
      gap: var(--lyric-lines-gap);
      width: 100%;
      animation: fadeIn 0.5s ease-out forwards;
      align-items: center;
      min-height: calc(var(--lyric-current-height) + var(--lyric-next-height) + var(--lyric-lines-gap));
      height: calc(var(--lyric-current-height) + var(--lyric-next-height) + var(--lyric-lines-gap));
      overflow: hidden;
      position: relative;
    }
    
    .lyrics-container.active { display: flex; }

    .lyric-line {
      font-weight: 500;
      white-space: normal;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: none;
    }

    .lyric-line.current {
      color: var(--text-main);
      font-size: 22px;
      line-height: 1.35;
      font-weight: 700;
      text-shadow: 0 2px 4px var(--text-shadow);
      height: var(--lyric-current-height);
      min-height: var(--lyric-current-height);
      max-height: var(--lyric-current-height);
      overflow: hidden;
    }

    .lyric-line.next {
      color: var(--text-sub);
      font-size: 16px;
      margin-top: 4px;
      line-height: 1.35;
      height: var(--lyric-next-height);
      min-height: var(--lyric-next-height);
      max-height: var(--lyric-next-height);
      overflow: hidden;
    }

    /* 3줄(원문/차음/번역) 모드에서 2줄 이상이 한 슬롯에 들어갈 때 — 고정
       높이 박스 안에 단일 줄 기준 폰트 크기를 그대로 쓰면 잘리거나 겹쳐서
       가독성이 떨어짐. 줄 수에 맞춰 기준 폰트를 줄이고 줄간격도 좁힌다.
       (하위 줄은 lyric-drawer.js의 displayText()가 0.7em 인라인 스타일로
       이미 상대적으로 더 작게 렌더링하므로, 여기서는 컨테이너 기준값만 조정) */
    .lyric-line.current.multi-line {
      font-size: 17px;
      line-height: 1.22;
    }
    .lyric-line.next.multi-line {
      font-size: 13px;
      line-height: 1.22;
    }

    .lyrics-container.line-promoting #lyric-current {
      transform: translateY(-14px);
      opacity: 0.72;
      color: var(--text-sub);
      font-size: 16px;
      font-weight: 500;
      transition-delay: 0ms;
    }
    .lyrics-container.line-promoting #lyric-next {
      transform: translateY(calc(-1 * (var(--lyric-next-height) + var(--lyric-lines-gap))));
      opacity: 1;
      color: var(--text-main);
      font-size: 22px;
      font-weight: 700;
      transition-delay: 0ms;
    }

    .lyrics-container.promote-setup #lyric-current {
      transform: translateY(0);
      opacity: 1;
    }
    .lyrics-container.promote-setup #lyric-next {
      transform: translateY(0);
      opacity: 1;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @keyframes lyrics-pop-right {
      0% { transform: translate(calc(100% + var(--enter-gap-x)), -50%) scale(0.97); }
      100% { transform: translate(-50%, -50%) scale(var(--overlay-scale)); }
    }
    @keyframes lyrics-pop-left {
      0% { transform: translate(calc(-100% - var(--enter-gap-x)), -50%) scale(0.97); }
      100% { transform: translate(-50%, -50%) scale(var(--overlay-scale)); }
    }
    @keyframes lyrics-pop-top {
      0% { transform: translate(-50%, calc(-100% - var(--enter-gap-y))) scale(0.97); }
      100% { transform: translate(-50%, -50%) scale(var(--overlay-scale)); }
    }
    @keyframes lyrics-pop-bottom {
      0% { transform: translate(-50%, calc(100% + var(--enter-gap-y))) scale(0.97); }
      100% { transform: translate(-50%, -50%) scale(var(--overlay-scale)); }
    }

  </style>
</head>
<body>
  <div class="overlay-container" id="overlay">
    <div class="lyrics-container" id="lyrics-area">
      <div class="lyric-line current" id="lyric-current">&nbsp;</div>
      <div class="lyric-line next" id="lyric-next">&nbsp;</div>
    </div>
  </div>

  <script src="js/overlay/shared.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const isPreview = urlParams.get('preview') === 'true';
    document.documentElement.setAttribute('data-theme', 'dark');

    const { hexToRgb, connectWS } = window.OverlayShared;

    const overlay = document.getElementById('overlay');
    const lyricsArea = document.getElementById('lyrics-area');
    const lyricCurrent = document.getElementById('lyric-current');
    const lyricNext = document.getElementById('lyric-next');
    let displayedCurrent = "";
    let displayedNext = "";
    let lineAnimTimer = null;
    let lastTrackSignature = "";
    let pendingTrackShowTimer = null;

    function setLineTexts(currentText, nextText) {
      // .lyric-line is `display:flex`; a bare text-node + <br> + <span> as
      // *direct* flex children each become their own flex item and lay out
      // side-by-side in a row — the <br> has no effect at all. Wrapping the
      // whole payload in one element makes it a single flex item, so its
      // *internal* content (including <br>) uses normal inline flow instead.
      lyricCurrent.innerHTML = currentText && currentText.trim() ? `<span>${currentText}</span>` : '&nbsp;';
      lyricNext.innerHTML = nextText && nextText.trim() ? `<span>${nextText}</span>` : '&nbsp;';
      // 3줄 모드에서 2줄 이상 보여지는 슬롯은 폰트를 줄여 고정 높이 박스 안에서
      // 잘리거나 겹치지 않게 한다(<br>로 조인되므로 그 존재 여부로 판단).
      lyricCurrent.classList.toggle('multi-line', /<br\s*\/?>/i.test(currentText || ''));
      lyricNext.classList.toggle('multi-line', /<br\s*\/?>/i.test(nextText || ''));
      displayedCurrent = currentText || "";
      displayedNext = nextText || "";
    }

    function animateLinePromotion(newCurrent, newNext) {
      if (lineAnimTimer) {
        clearTimeout(lineAnimTimer);
        lineAnimTimer = null;
      }
      lyricsArea.classList.remove('line-promoting');
      lyricsArea.classList.remove('promote-setup');
      setLineTexts(newCurrent, newNext);
    }

    function updateOverlay(data) {
      if (!data) return;

      if (!data.is_playing && !isPreview && !data.is_force_visible) {
        hideOverlay();
        return;
      }
      
      const style = data.lyrics_style || {};
      const scale = style.scale || 1.0;
      const font = style.font || 'Inter';
      const color = (style.color || 'ffffff').replace('#', '');
      const textColorHex = (style.text_color || style.textColor || 'ffffff').replace('#', '');
      const bgColor = (style.bg_color || "0f0f14").replace('#', '');
      const bgOpacity = style.bg_opacity !== undefined ? style.bg_opacity : 0.6;
      const rounding = style.rounding !== undefined ? style.rounding : 20;
      const direction = style.animation_direction || 'right';

      document.documentElement.style.setProperty('--overlay-scale', scale);
      document.documentElement.style.setProperty('--overlay-font', `"${font}", 'Noto Sans KR', sans-serif`);
      document.documentElement.style.setProperty('--glass-bg', `rgba(${hexToRgb(bgColor)}, ${bgOpacity})`);
      document.documentElement.style.setProperty('--overlay-rounding', `${rounding}px`);
      document.documentElement.style.setProperty('--accent-color', `#${color}`);
      document.documentElement.style.setProperty('--text-main', `#${textColorHex}`);
      document.documentElement.style.setProperty('--text-sub', `rgba(${hexToRgb(textColorHex)}, 0.58)`);
      
      let duration = '0.85s';
      if (direction === 'right' || direction === 'left') duration = '1.5s';
      else duration = '0.7s';
      document.documentElement.style.setProperty('--anim-duration', duration);
      
      const hasCurrent = data.current_lyric && data.current_lyric.trim() !== "";
      const hasNext = data.next_lyric && data.next_lyric.trim() !== "";
      const nextTitle = (data.title || "").trim();
      const nextArtist = (data.artist || "").trim();
      const trackSignature = `${nextTitle}__${nextArtist}__${(data.thumbnail || "").slice(0, 80)}`;
      const trackChanged = !!nextTitle && trackSignature !== lastTrackSignature;

      const shouldShow = hasCurrent || hasNext || data.is_force_visible || isPreview;

      const applyShow = () => {
        overlay.classList.remove('dir-left', 'dir-right', 'dir-top', 'dir-bottom');
        overlay.classList.add(`dir-${direction}`);
        overlay.dataset.currentDirection = direction;
        
        if (shouldShow) {
          lyricsArea.classList.add('active');
          const newCurrent = hasCurrent ? data.current_lyric : "";
          const newNext = hasNext ? data.next_lyric : "";
          const shouldPromote = displayedNext && newCurrent && displayedNext === newCurrent;
          if (shouldPromote) {
            animateLinePromotion(newCurrent, newNext);
          } else {
            setLineTexts(newCurrent, newNext);
          }
          if (trackChanged && overlay.classList.contains('visible')) {
            if (pendingTrackShowTimer) {
              clearTimeout(pendingTrackShowTimer);
              pendingTrackShowTimer = null;
            }
            hideOverlay();
            pendingTrackShowTimer = setTimeout(() => {
              showOverlay();
              pendingTrackShowTimer = null;
            }, 170);
          } else {
            showOverlay();
          }
        } else {
          lyricsArea.classList.remove('active');
          hideOverlay();
        }
      };

      const oldDirection = overlay.dataset.currentDirection;
      if (oldDirection && oldDirection !== direction && overlay.classList.contains('visible')) {
        hideOverlay();
        setTimeout(applyShow, 300);
      } else {
        applyShow();
      }
      if (nextTitle) {
        lastTrackSignature = trackSignature;
      }
    }

    function showOverlay() { overlay.classList.add('visible'); }
    function hideOverlay() { overlay.classList.remove('visible'); }

    connectWS(updateOverlay);
  </script>
</body>
</html>
