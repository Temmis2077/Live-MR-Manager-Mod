<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Live MR Song Info Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700;900&display=swap');

    :root {
      --accent-color: #3b82f6;
      --overlay-scale: 1;
      --overlay-font: 'Inter', 'Noto Sans KR', sans-serif;
      --overlay-rounding: 20px;
      --glass-bg: rgba(15, 15, 20, 0.85);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --thumb-fallback: #222;
      --enter-gap-x: 120px;
      --enter-gap-y: 80px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      color: var(--text-main);
      font-family: var(--overlay-font);
      overflow: hidden;
      width: 1200px;
      height: 300px;
      position: relative;
    }

    .overlay-container {
      position: absolute;
      display: flex;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      padding: 16px 24px;
      border-radius: var(--overlay-rounding);
      gap: 20px;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
      
      /* Hard cap overlay width regardless of content length */
      width: min(400px, calc(100vw - 32px));
      max-width: min(400px, calc(100vw - 32px));
      min-width: 0;
      
      transition: 
        transform 0.62s cubic-bezier(0.18, 1.32, 0.38, 1),
        opacity 0.32s ease;
      will-change: transform, opacity;
      opacity: 0;
    }

    /* RIGHT ALIGNED */
    .overlay-container.dir-right {
      right: 400px;
      top: 50%;
      transform-origin: right center;
      transform: translate(calc(100% + var(--enter-gap-x)), -50%) scale(0.93);
    }
    .overlay-container.dir-right.visible {
      transform: translate(0, -50%) scale(var(--overlay-scale));
      opacity: 1;
    }

    /* LEFT ALIGNED */
    .overlay-container.dir-left {
      left: 400px;
      top: 50%;
      transform-origin: left center;
      transform: translate(calc(-100% - var(--enter-gap-x)), -50%) scale(0.93);
    }
    .overlay-container.dir-left.visible {
      transform: translate(0, -50%) scale(var(--overlay-scale));
      opacity: 1;
    }

    /* TOP ALIGNED */
    .overlay-container.dir-top {
      left: 50%;
      top: 50%;
      transform-origin: center top;
      transform: translate(-50%, calc(-100% - var(--enter-gap-y))) scale(0.93);
    }
    .overlay-container.dir-top.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
    }

    /* BOTTOM ALIGNED */
    .overlay-container.dir-bottom {
      left: 50%;
      top: 50%;
      transform-origin: center bottom;
      transform: translate(-50%, calc(100% + var(--enter-gap-y))) scale(0.93);
    }
    .overlay-container.dir-bottom.visible {
      transform: translate(-50%, -50%) scale(var(--overlay-scale));
      opacity: 1;
    }

    .thumbnail-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .thumbnail {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      object-fit: cover;
      background: var(--thumb-fallback);
    }

    .info {
      flex: 1 1 auto;
      min-width: 0;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .label {
      font-size: 11px;
      font-weight: 900;
      color: var(--accent-color);
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .scroll-window {
      width: 100%;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .scroll-text {
      display: inline-block;
      white-space: nowrap;
      width: max-content;
      padding-bottom: 6px; /* g, y 등 아래로 뻗는 글자가 짤리는 것 완벽 방지 */
      will-change: transform;
    }

    #title {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-main);
      line-height: 1.2;
    }

    #artist {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      line-height: 1.2;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="overlay-container" id="container">
    <div class="thumbnail-wrapper" id="thumb-wrap">
      <img src="" alt="" class="thumbnail" id="thumb">
    </div>
    <div class="info">
      <div class="label">NOW PLAYING</div>
      <div class="scroll-window"><div class="scroll-text" id="title">Title</div></div>
      <div class="scroll-window"><div class="scroll-text" id="artist">Artist</div></div>
    </div>
  </div>

  <script src="js/overlay/shared.js"></script>
  <script>
    const container = document.getElementById('container');
    document.documentElement.setAttribute('data-theme', 'dark');
    const { hexToRgb, connectWS } = window.OverlayShared;
    const thumbWrap = document.getElementById('thumb-wrap');
    const thumb = document.getElementById('thumb');
    const activeAnimations = {};
    const pendingMarqueeFrames = {};
    let pendingHideTimer = null;
    let lastDisplayTitle = "Ready";
    let lastDisplayArtist = "";
    let lastRenderedTitle = "";
    let lastRenderedArtist = "";
    let lastThumbVisible = true;
    const lastMeasuredWidth = { title: 0, artist: 0 };
    const DEFAULT_THUMB_URL = `${window.location.origin}/assets/images/app-icon.png`;
    let lastTrackSignature = "";
    let pendingTrackShowTimer = null;
    const STAGE_WIDTH = 1200;
    const PREVIEW_STAGE_WIDTH = 1760;
    const PREVIEW_STAGE_HEIGHT = 520;
    const MARQUEE_BUMP = Math.round(STAGE_WIDTH * 0.08); // 1200px 기준 범핑
    const isPreviewMode = window.location.search.includes('preview=true');
    
    function applyMarquee(elId, text, attempt = 0) {
      const el = document.getElementById(elId);
      const parent = el.parentElement;
      
      // 1. 기존 애니메이션 완전 파기
      if (activeAnimations[elId]) {
        activeAnimations[elId].cancel();
        activeAnimations[elId] = null;
      }
      if (pendingMarqueeFrames[elId]) {
        cancelAnimationFrame(pendingMarqueeFrames[elId]);
        pendingMarqueeFrames[elId] = null;
      }
      
      // 2. 초기화 및 텍스트 갱신
      el.textContent = text;
      el.style.transform = 'none';
      
      // 3. 강제 동기화 (글자 크기를 정확하게 재기 위함)
      void el.offsetWidth;
      
      const textWidth = Math.ceil(el.scrollWidth || 0);
      const parentWidth = Math.floor(parent.getBoundingClientRect().width || parent.clientWidth || 0);
      const containerWidth = Math.floor(container.getBoundingClientRect().width || 0);
      const thumbWidth = (thumbWrap && thumbWrap.style.display !== 'none')
        ? Math.floor(thumbWrap.getBoundingClientRect().width || 0)
        : 0;
      const containerStyle = getComputedStyle(container);
      const gap = Math.floor(parseFloat(containerStyle.columnGap || containerStyle.gap || '0') || 0);
      const paddingLeft = Math.floor(parseFloat(containerStyle.paddingLeft || '0') || 0);
      const paddingRight = Math.floor(parseFloat(containerStyle.paddingRight || '0') || 0);
      const explicitInfoWidth = Math.max(0, containerWidth - thumbWidth - gap - paddingLeft - paddingRight);
      const windowWidth = Math.max(0, Math.min(parentWidth, explicitInfoWidth || parentWidth));
      const canMeasure = textWidth > 0 && windowWidth > 0;

      // Layout is not ready yet (e.g. right after thumbnail/layout change)
      if (!canMeasure) {
        if (attempt >= 5) {
          el.style.transform = 'none';
          return;
        }
        pendingMarqueeFrames[elId] = requestAnimationFrame(() => applyMarquee(elId, text, attempt + 1));
        return;
      }
      
      // 4. 화면 크기보다 글자가 길다면 JS 기반 애니메이션 시작
      const normalizedText = (text || "").replace(/\s+/g, " ").trim();
      const forceMarqueeByLength = elId === 'title' && normalizedText.length >= 18;
      const shouldMarquee = textWidth > (windowWidth - 8) || forceMarqueeByLength;

      if (shouldMarquee) {
        // Always start visible at x=0 to prevent intermittent "missing title" starts.
        const overflowDistance = Math.max(1, textWidth - windowWidth);
        const minTravel = forceMarqueeByLength ? 36 : 20;
        const travelDistance = overflowDistance + minTravel + MARQUEE_BUMP;
        const totalDistance = travelDistance * 2;
        const durationMs = (totalDistance / 50) * 1000; // 초당 50px 속도
        
        // CSS의 불확실성을 피하고 Web Animations API를 사용하여 강제로 애니메이션 구동
        activeAnimations[elId] = el.animate([
          { transform: 'translateX(0)' },
          { transform: `translateX(-${travelDistance}px)` }
        ], {
          duration: durationMs,
          iterations: Infinity,
          direction: 'alternate',
          easing: 'ease-in-out'
        });
      } else {
        el.style.transform = 'none';
      }
    }

    function update(data) {
      if (!data) return;
      try {
        const style = data.info_style || data.infoStyle || {};
        const playing = data.is_playing === true || data.isPlaying === true;
        const forced = data.is_force_visible === true || data.isForceVisible === true;
        const isPreview = window.location.search.includes('preview=true');
        const nextTitle = (data.title || "").trim();
        const nextArtist = (data.artist || "").trim();
        const trackSignature = `${nextTitle}__${nextArtist}__${(data.thumbnail || "").slice(0, 80)}`;
        const trackChanged = !!nextTitle && trackSignature !== lastTrackSignature;
        const displayTitle = nextTitle || lastDisplayTitle || "Ready";
        const displayArtist = nextArtist || lastDisplayArtist || "";
        const shouldShow = playing || forced || isPreview;

        // Styles
        document.documentElement.style.setProperty('--overlay-scale', style.scale || 1.0);
        document.documentElement.style.setProperty('--overlay-font', `"${style.font || 'Inter'}", 'Noto Sans KR', sans-serif`);
        document.documentElement.style.setProperty('--overlay-rounding', `${style.rounding !== undefined ? style.rounding : 20}px`);
        document.documentElement.style.setProperty('--accent-color', `#${(style.color || '3b82f6').replace('#','')}`);
        const textColor = `#${(style.text_color || style.textColor || 'ffffff').replace('#', '')}`;
        const textColorRgb = hexToRgb(style.text_color || style.textColor || 'ffffff');
        document.documentElement.style.setProperty('--text-main', textColor);
        document.documentElement.style.setProperty('--text-muted', `rgba(${textColorRgb}, 0.62)`);
        document.documentElement.style.setProperty('--glass-bg', `rgba(${hexToRgb(style.bg_color || style.bgColor)}, ${style.bg_opacity ?? style.bgOpacity ?? 0.85})`);

        // Layout / Direction
        const dir = style.animation_direction || style.animationDirection || 'right';
        
        container.classList.remove('dir-left', 'dir-right', 'dir-top', 'dir-bottom');
        container.classList.add(`dir-${dir}`);

        // Content layout first (thumbnail affects available text width)
        const hasThumb = !!(data.thumbnail && data.thumbnail.length > 20);
        const shouldShowThumb = true;
        const thumbVisibilityChanged = shouldShowThumb !== lastThumbVisible;
        thumbWrap.style.display = 'block';
        thumb.src = hasThumb ? data.thumbnail : DEFAULT_THUMB_URL;
        lastThumbVisible = shouldShowThumb;

        const titleChanged = displayTitle !== lastRenderedTitle;
        const artistChanged = displayArtist !== lastRenderedArtist;
        const titleParentWidth = Math.floor(document.getElementById('title').parentElement.getBoundingClientRect().width || 0);
        const artistParentWidth = Math.floor(document.getElementById('artist').parentElement.getBoundingClientRect().width || 0);
        const widthChanged =
          Math.abs(titleParentWidth - (lastMeasuredWidth.title || 0)) > 1 ||
          Math.abs(artistParentWidth - (lastMeasuredWidth.artist || 0)) > 1;
        const shouldReflowMarquee = titleChanged || artistChanged || thumbVisibilityChanged || widthChanged;

        // Apply marquee only when text/layout changed to avoid constant animation resets.
        if (shouldReflowMarquee) {
          requestAnimationFrame(() => {
            applyMarquee('title', displayTitle);
            applyMarquee('artist', displayArtist);
          });
          lastRenderedTitle = displayTitle;
          lastRenderedArtist = displayArtist;
          lastMeasuredWidth.title = titleParentWidth;
          lastMeasuredWidth.artist = artistParentWidth;
        }

        // Keep last non-empty metadata to avoid intermittent empty packets clearing text.
        if (nextTitle) lastDisplayTitle = nextTitle;
        if (nextArtist) lastDisplayArtist = nextArtist;

        if (shouldShow) {
          if (pendingHideTimer) {
            clearTimeout(pendingHideTimer);
            pendingHideTimer = null;
          }
          if (trackChanged && container.classList.contains('visible')) {
            if (pendingTrackShowTimer) {
              clearTimeout(pendingTrackShowTimer);
              pendingTrackShowTimer = null;
            }
            container.classList.remove('visible');
            pendingTrackShowTimer = setTimeout(() => {
              container.classList.add('visible');
              pendingTrackShowTimer = null;
            }, 170);
          } else {
            container.classList.add('visible');
          }
        } else {
          // Avoid flicker when backend briefly reports non-playing during transitions.
          if (!pendingHideTimer) {
            pendingHideTimer = setTimeout(() => {
              container.classList.remove('visible');
              pendingHideTimer = null;
            }, 220);
          }
        }
        if (nextTitle) {
          lastTrackSignature = trackSignature;
        }
      } catch (e) { console.error(e); }
    }

    if (isPreviewMode) {
      document.body.style.width = `${PREVIEW_STAGE_WIDTH}px`;
      document.body.style.height = `${PREVIEW_STAGE_HEIGHT}px`;
    }
    connectWS(update);
    thumb.onerror = () => {
      if (thumb.src !== DEFAULT_THUMB_URL) {
        thumb.src = DEFAULT_THUMB_URL;
      }
    };
    thumbWrap.style.display = 'block';
    if (!thumb.src) {
      thumb.src = DEFAULT_THUMB_URL;
    }

    if (window.__TAURI__) {
      window.__TAURI__.event.listen('overlay-state-update', (event) => {
        update(event.payload);
      });
      window.__TAURI__.core.invoke('get_overlay_state').then(update).catch(() => {});
    }
  </script>
</body>
</html>
