name: "release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            bundleArgs: --bundles nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Live MR Manager (Beta) ${{ github.ref_name }} - AI Vocal Remover & Live Backing Track Manager with Lyrics Sync."
          releaseBody: |
            🎙️ Live MR Manager(Beta) ${{ github.ref_name }} 릴리즈

            AI 기반 오디오 분리 및 정밀 제어를 지원하는 Live MR Manager(Beta)의 최신 릴리즈입니다.

            **Windows용 NSIS 설치 파일**을 다운로드하세요.

            상세 변경 사항: [RELEASE_NOTES.md](https://github.com/AutumnColor77/Live-MR-Manager/blob/main/RELEASE_NOTES.md)
          releaseDraft: true
          prerelease: false
          args: "--verbose ${{ matrix.bundleArgs }}"
