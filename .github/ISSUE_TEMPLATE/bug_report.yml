name: 버그 신고
description: 앱 오류·재현 가능한 문제를 보고합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 버그는 이 템플릿으로 등록해 주세요. 일반 사용법 질문은 [FAQ](https://lmrm.vercel.app/faq) 또는 [문의 허브](https://lmrm.vercel.app/qa)를 이용해 주세요.
        **토큰·Client Secret·전체 로그는 올리지 마세요.**

  - type: input
    id: app_version
    attributes:
      label: 앱 버전
      description: "예: v0.4.15 (설정 → 앱 업데이트에서 확인)"
      placeholder: v0.4.15
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: Windows 버전
      placeholder: "예: Windows 11 23H2"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 문제가 발생하기까지 한 단계씩 적어 주세요.
      placeholder: |
        1. 설정 → 멜로밍 노래책에서 …
        2. 「가져오기」 클릭
        3. 오류 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷
      description: 이미지를 끌어다 놓거나 URL을 붙여 넣을 수 있습니다.

  - type: textarea
    id: logs
    attributes:
      label: 로그 (선택)
      description: 민감 정보(토큰, 채널 ID 전체)는 제외해 주세요.
