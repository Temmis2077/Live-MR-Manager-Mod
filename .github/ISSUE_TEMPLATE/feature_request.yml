name: 기능 제안
description: 새 기능이나 개선 아이디어를 제안합니다.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        기능 제안은 환영합니다. 빠른 질문은 [문의 허브](https://lmrm.vercel.app/qa)의 Discord를 이용해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하고 싶으신가요?
      description: 지금 겪는 불편함이나 목표를 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작이나 UI를 구체적으로 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 (선택)
      description: 지금 쓰는 우회 방법이 있다면 알려 주세요.
