name: 멜로밍 연동 문의
description: Pull/Push·OAuth·채널 저장 등 멜로밍 노래책 연동 관련 문의입니다.
title: "[Meloming] "
labels:
  - meloming
  - question
body:
  - type: markdown
    attributes:
      value: |
        [FAQ — 채널 주소](https://lmrm.vercel.app/faq#channel-id)를 먼저 확인해 주세요.
        **OAuth access token·refresh token·Client Secret은 올리지 마세요.**

  - type: dropdown
    id: symptom
    attributes:
      label: 증상
      options:
        - 채널 저장 / 연결 테스트
        - 가져오기 (Pull)
        - 보내기 (Push)
        - 멜로밍 로그인 (OAuth)
        - 기타
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: 앱 버전
      placeholder: v0.4.15
    validations:
      required: true

  - type: input
    id: channel_hint
    attributes:
      label: 채널 주소 형식 (선택)
      description: 플랫폼 종류만 적어도 됩니다. 전체 URL·ID는 마스킹해 주세요.
      placeholder: "예: 치지직 chzzk.naver.com/… (일부 마스킹)"

  - type: textarea
    id: error_message
    attributes:
      label: 오류 메시지
      description: 앱에 표시된 메시지를 그대로 붙여 넣어 주세요.

  - type: checkboxes
    id: faq_checked
    attributes:
      label: 확인 사항
      options:
        - label: FAQ의 채널 주소·연동 안내를 확인했습니다.
          required: true
